name: Release cereal developer libraries

on:
  push:
    tags:
      - '[0-9]*'

env:
  DO_ACCESS_KEY: ${{ secrets.DO_ACCESS_KEY }}
  DO_SECRET_KEY: ${{ secrets.DO_SECRET_KEY }}
  DO_SPACE_NAME_MAVEN: ${{ secrets.DO_SPACE_NAME_MAVEN }}
  DO_SPACE_REGION: ${{ secrets.DO_SPACE_REGION }}

jobs:
  build:
    name: Build ${{ matrix.module }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [cereal-sdk, cereal-test-utils]
    steps:
      - uses: actions/checkout@v6
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: |
            17
            21
          cache: 'gradle'
      - name: Build
        run:
          ./gradlew ${{ matrix.module }}:jar --console=plain
      - name: Create maven artifact
        run:
          ./gradlew ${{ matrix.module }}:publishUnobfuscatedPublicationToLocalBuildRepository -Pversion=${{ github.ref_name }} --console=plain
      - name: Upload artifacts to maven repository
        uses: BetaHuhn/do-spaces-action@v2
        with:
          access_key: ${{ env.DO_ACCESS_KEY }}
          secret_key: ${{ env.DO_SECRET_KEY }}
          space_name: ${{ env.DO_SPACE_NAME_MAVEN }}
          space_region: ${{ env.DO_SPACE_REGION }}
          source: ${{ matrix.module }}/build/maven
          out_dir: releases
      - name: Store release jar
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.module }}-${{ github.ref_name }}-release
          path: ${{ matrix.module }}/build/libs/release.jar
